<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Sign In | MediCare AI</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
		<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
	</head>
	<body>
		<div class="auth-shell">
			<div class="auth-card">
				<div class="auth-badge-row">
					<span class="auth-badge"><i class="fas fa-user-shield"></i> Secure Access</span>
					<span class="auth-badge"><i class="fas fa-heartbeat"></i> Health Assistant</span>
				</div>
				<div class="auth-brand">
					<div class="brand-icon"><i class="fas fa-stethoscope"></i></div>
					<div>
						<h1>MediCare AI</h1>
						<p>Secure medical assistant workspace</p>
					</div>
				</div>

				<h2>Sign in to continue</h2>
				<p class="auth-subtitle">Access your AI clinical support dashboard.</p>

				{% if error_message %}
				<div class="auth-error" role="alert">{{ error_message }}</div>
				{% endif %}

				<form method="POST" action="{{ url_for('login') }}" class="auth-form">
					<label for="username">Username</label>
					<input type="text" id="username" name="username" class="auth-input" required autofocus>

					<label for="password">Password</label>
					<input type="password" id="password" name="password" class="auth-input" required>

					<button type="submit" class="auth-submit">Sign In</button>
				</form>
				<div class="auth-footnote">This assistant is educational and does not replace emergency medical care.</div>
			</div>
		</div>
	</body>
</html>
